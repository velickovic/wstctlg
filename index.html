<title>Katalog otpada — indeksni brojevi</title>

<style>
  :root{
    --bg:#14171C; --surface:#1B2026; --surface-2:#222a32;
    --line:#2A323B; --line-soft:#222a32;
    --ink:#EBEEF2; --ink-dim:#9AA4AF; --ink-faint:#6B7681;
    --hazard:#F5A623; --hazard-bg:#3a2a0c; --hazard-line:#5c4214;
    --safe:#36D29A; --safe-bg:#0e2a22; --safe-line:#1c5040;
    --ji:#5BA8F2; --ji-bg:#10243a; --ji-line:#214a72;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.45;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);min-height:100vh;}
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px;}

  header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:16px;}
  .brand{font-weight:700;font-size:15px;letter-spacing:.02em;}
  .brand .mark{color:var(--hazard);}
  .sub{font-size:12px;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;}

  .modes{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:10px;}
  .modes button{flex:1;border:0;background:transparent;color:var(--ink-dim);font-family:var(--sans);font-size:13.5px;font-weight:600;padding:9px 6px;border-radius:9px;cursor:pointer;white-space:nowrap;}
  .modes button[aria-selected="true"]{background:var(--surface-2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line);}
  .modes button#m-our[aria-selected="true"]{color:var(--ji);box-shadow:inset 0 0 0 1px var(--ji-line);}

  .field{position:relative;margin-bottom:10px;}
  #q{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:14px;color:var(--ink);
    font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:.06em;padding:18px 52px 18px 18px;outline:none;}
  #q::placeholder{color:var(--ink-faint);font-weight:500;letter-spacing:.02em;}
  #q:focus{border-color:var(--hazard);}
  body.name-mode #q,body.our-mode #q{font-family:var(--sans);font-size:19px;font-weight:500;letter-spacing:0;}
  .clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:34px;height:34px;border:0;border-radius:50%;
    background:var(--surface-2);color:var(--ink-dim);font-size:18px;line-height:1;cursor:pointer;display:none;}
  .clear.show{display:flex;align-items:center;justify-content:center;}

  .meta{font-size:12px;color:var(--ink-faint);margin:2px 2px 12px;min-height:16px;}
  ul.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .row{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:13px 14px;cursor:pointer;
    display:flex;align-items:center;gap:11px;transition:border-color .12s ease;}
  .row:active{border-color:var(--hazard);}
  .dot{width:9px;height:9px;border-radius:50%;flex:none;}
  .dot.h{background:var(--hazard);box-shadow:0 0 0 3px var(--hazard-bg);}
  .dot.s{background:var(--safe);box-shadow:0 0 0 3px var(--safe-bg);}
  .row .code{font-family:var(--mono);font-size:15px;font-weight:600;letter-spacing:.05em;flex:none;width:82px;}
  .row .nm{font-size:13.5px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}
  .row .chev{color:var(--ink-faint);flex:none;}
  .pb-wrap{flex:none;}
  .pb{font-size:10px;font-weight:700;letter-spacing:.03em;padding:3px 6px;border-radius:6px;white-space:nowrap;}
  .pb-all{background:var(--ji-bg);color:var(--ji);border:1px solid var(--ji-line);}
  .pb-st{background:var(--safe-bg);color:var(--safe);border:1px solid var(--safe-line);}
  .pb-sk{background:var(--hazard-bg);color:var(--hazard);border:1px solid var(--hazard-line);}

  .card{border-radius:16px;border:1px solid var(--line);overflow:hidden;}
  .card.hazard{border-color:var(--hazard-line);}
  .card.safe{border-color:var(--safe-line);}
  .card .top{padding:18px 18px 16px;}
  .card.hazard .top{background:linear-gradient(180deg,var(--hazard-bg),transparent);}
  .card.safe .top{background:linear-gradient(180deg,var(--safe-bg),transparent);}
  .badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:20px;}
  .badge.h{color:var(--hazard);background:var(--hazard-bg);border:1px solid var(--hazard-line);}
  .badge.s{color:var(--safe);background:var(--safe-bg);border:1px solid var(--safe-line);}
  .bigcode{font-family:var(--mono);font-size:38px;font-weight:700;letter-spacing:.08em;margin:12px 0 2px;}
  .bigcode .star{color:var(--hazard);}
  .naziv{font-size:18px;line-height:1.4;color:var(--ink);margin-top:8px;}
  .ctx{border-top:1px solid var(--line);padding:14px 18px;display:flex;flex-direction:column;gap:13px;}
  .ctx .k{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:3px;}
  .ctx .v{font-size:14px;color:var(--ink-dim);}
  .ctx .v b{color:var(--ink);font-weight:600;}
  .permit-block{display:flex;flex-direction:column;gap:9px;}
  .prow{display:flex;align-items:flex-start;gap:10px;}
  .pico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:none;}
  .pico.st{background:var(--safe-bg);color:var(--safe);}
  .pico.sk{background:var(--hazard-bg);color:var(--hazard);}
  .pk{font-size:13.5px;font-weight:600;color:var(--ink);}
  .pv{font-size:12px;color:var(--ink-faint);margin-top:1px;}
  .permit-none{font-size:14px;color:var(--ink-faint);font-style:italic;}
  .actions{display:flex;gap:8px;padding:0 18px 18px;}
  .actions button{flex:1;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);font-family:var(--sans);
    font-size:14px;font-weight:600;padding:11px;border-radius:11px;cursor:pointer;}
  .actions button:active{border-color:var(--hazard);}

  .empty h2{font-size:13px;font-weight:600;color:var(--ink-faint);letter-spacing:.04em;text-transform:uppercase;margin:0 2px 10px;}
  .chips{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .chip{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;padding:12px 13px;cursor:pointer;
    text-align:left;display:flex;gap:11px;align-items:flex-start;}
  .chip:active{border-color:var(--hazard);}
  .chip .gn{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--hazard);flex:none;}
  .chip .gt{font-size:12px;color:var(--ink-dim);line-height:1.35;}
  .none{color:var(--ink-faint);font-size:14px;padding:18px 2px;}
  footer{margin-top:26px;text-align:center;font-size:11px;color:var(--ink-faint);line-height:1.6;}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);
    font-size:13px;font-weight:600;padding:10px 16px;border-radius:10px;opacity:0;pointer-events:none;transition:.2s;z-index:10;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .back{display:none;background:transparent;border:0;color:var(--hazard);font-family:var(--sans);font-size:14px;font-weight:600;padding:6px 0;margin-bottom:10px;cursor:pointer;}
  .back.show{display:inline-flex;align-items:center;gap:6px;}
</style>
</head>

    else if(line[0]==='>'){subgroups[line.slice(1,5)]=line.slice(6).trim();}
    else{
      var sp=line.indexOf(' ');var code=line.slice(0,sp);var name=line.slice(sp+1).trim();
      var haz=code.indexOf('*')>-1;code=code.replace('*','');
      var pf=PERMIT[code]||0;
      var e={code:code,fmt:fmt(code),name:name,haz:haz,g:code.slice(0,2),s:code.slice(0,4),pf:pf};
      entries.push(e);byCode[code]=e;
    }
  });
  function norm(s){return s.toLowerCase().replace(/[čć]/g,'c').replace(/š/g,'s').replace(/ž/g,'z').replace(/đ/g,'d');}
  entries.forEach(function(e){e.q=norm(e.name);});

  var qEl=document.getElementById('q');
  var clearEl=document.getElementById('clear');
  var metaEl=document.getElementById('meta');
  var outEl=document.getElementById('out');
  var backEl=document.getElementById('back');
  var toastEl=document.getElementById('toast');
  var mNum=document.getElementById('m-num');
  var mName=document.getElementById('m-name');
  var mOur=document.getElementById('m-our');
  var mode='num';var filterOur=false;var lastResults=null;

  function setMode(m){
    if(m==='our'){
      filterOur=true;
      mOur.setAttribute('aria-selected','true');
      mNum.setAttribute('aria-selected','false');
      mName.setAttribute('aria-selected','false');
    } else {
      filterOur=false;mode=m;
      mOur.setAttribute('aria-selected','false');
      document.body.classList.toggle('name-mode',m==='name');
      document.body.classList.toggle('num-mode',m==='num');
      mNum.setAttribute('aria-selected',m==='num');
      mName.setAttribute('aria-selected',m==='name');
      qEl.setAttribute('inputmode',m==='num'?'numeric':'text');
      qEl.placeholder=m==='num'?'npr. 16 01 03':'npr. ambalaža, ulje, baterije';
    }
    qEl.value='';clearEl.classList.remove('show');qEl.focus();render();
  }
  mNum.addEventListener('click',function(){setMode('num');});
  mName.addEventListener('click',function(){setMode('name');});
  mOur.addEventListener('click',function(){setMode('our');});

  function formatLive(v){
    var d=v.replace(/[^0-9]/g,'').slice(0,6);
    var out='';for(var i=0;i<d.length;i++){if(i===2||i===4)out+=' ';out+=d[i];}
    return{disp:out,digits:d};
  }
  qEl.addEventListener('input',function(){
    if(mode==='num'&&!filterOur){var f=formatLive(qEl.value);qEl.value=f.disp;}
    clearEl.classList.toggle('show',qEl.value.length>0);
    render();
  });
  clearEl.addEventListener('click',function(){qEl.value='';clearEl.classList.remove('show');qEl.focus();render();});
  backEl.addEventListener('click',function(){if(lastResults){renderList(lastResults.items,lastResults.label);}});

  function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function permitBadgeSmall(pf){
    if(!pf)return '';
    var st=pf&1,sk=pf&2;
    if(st&&sk)return '<span class="pb pb-all">◈ JI</span>';
    if(st)return '<span class="pb pb-st">⟳ S+T</span>';
    return '<span class="pb pb-sk">▣ Sk</span>';
  }
  function permitBadgeFull(pf){
    if(!pf)return '<div class="permit-none">Nije u dozvolama Jugo-Impex</div>';
    var st=pf&1,sk=pf&2,rows='';
    if(st)rows+='<div class="prow"><span class="pico st">⟳</span><div><div class="pk">Sakupljanje i transport</div><div class="pv">Dozvola 007/3 &middot; važi do 03.05.2030.</div></div></div>';
    if(sk)rows+='<div class="prow"><span class="pico sk">▣</span><div><div class="pk">Skladištenje</div><div class="pv">Integralna dozvola &middot; Radni plan 2025</div></div></div>';
    return '<div class="permit-block">'+rows+'</div>';
  }

  function render(){
    backEl.classList.remove('show');
    var v=qEl.value.trim();
    if(filterOur){
      var pool=entries.filter(function(e){return e.pf>0;});
      var matched=pool;
      if(v.length>=2){
        var sq=norm(v);
        var dq=v.replace(/[^0-9]/g,'');
        matched=pool.filter(function(e){return e.q.indexOf(sq)>-1||(dq.length>=2&&e.code.indexOf(dq)===0);});
      }
      renderList(matched,'Jugo-Impex dozvole &middot; '+pool.length+' kodova');
      return;
    }
    if(!v){renderEmpty();return;}
    if(mode==='num'){
      var d=v.replace(/[^0-9]/g,'');
      if(!d){renderEmpty();return;}
      var matches=entries.filter(function(e){return e.code.indexOf(d)===0;});
      if(d.length===6&&byCode[d]){renderDetail(byCode[d],null);return;}
      renderList(matches,prefixLabel(d));
    } else {
      var nq=norm(v);
      if(nq.length<2){metaEl.textContent='Ukucaj bar 2 slova...';outEl.innerHTML='';return;}
      var matches2=entries.filter(function(e){return e.q.indexOf(nq)>-1;});
      renderList(matches2,null);
    }
  }

  function prefixLabel(d){
    if(d.length>=4&&subgroups[d.slice(0,4)])return 'Podgrupa '+d.slice(0,2)+' '+d.slice(2,4)+' · '+subgroups[d.slice(0,4)];
    if(d.length>=2&&groups[d.slice(0,2)])return 'Grupa '+d.slice(0,2)+' · '+groups[d.slice(0,2)];
    return null;
  }

  function renderList(items,label){
    lastResults={items:items,label:label};
    backEl.classList.remove('show');
    if(!items.length){
      metaEl.textContent='';
      outEl.innerHTML='<div class="none">Nema rezultata. Proveri broj ili pretraži po nazivu.</div>';
      return;
    }
    if(items.length===1){renderDetail(items[0],{items:items,label:label});return;}
    metaEl.innerHTML=(label?label+'  &middot;  ':'')+items.length+' rezultata';
    var html='<ul class="list">';
    items.slice(0,400).forEach(function(e){
      html+='<li class="row" data-code="'+e.code+'">'
        +'<span class="dot '+(e.haz?'h':'s')+'"></span>'
        +'<span class="code">'+e.fmt+(e.haz?'<span style="color:var(--hazard)">*</span>':'')+'</span>'
        +'<span class="nm">'+esc(e.name)+'</span>'
        +(e.pf?'<span class="pb-wrap">'+permitBadgeSmall(e.pf)+'</span>':'')
        +'<span class="chev">›</span>'
        +'</li>';
    });
    html+='</ul>';
    outEl.innerHTML=html;
    Array.prototype.forEach.call(outEl.querySelectorAll('.row'),function(row){
      row.addEventListener('click',function(){renderDetail(byCode[row.getAttribute('data-code')],lastResults);});
    });
  }

  function renderDetail(e,returnTo){
    metaEl.textContent='';
    if(returnTo&&returnTo.items&&returnTo.items.length>1){backEl.classList.add('show');lastResults=returnTo;}
    else{backEl.classList.remove('show');}
    var cls=e.haz?'hazard':'safe';
    var badge=e.haz?'<span class="badge h">&#9888; Opasan otpad</span>':'<span class="badge s">&#9679; Neopasan otpad</span>';
    var html='<div class="card '+cls+'">'
      +'<div class="top">'+badge
      +'<div class="bigcode">'+e.fmt+(e.haz?'<span class="star">*</span>':'')+'</div>'
      +'<div class="naziv">'+esc(e.name)+'</div>'
      +'</div>'
      +'<div class="ctx">'
      +'<div><div class="k">Grupa</div><div class="v"><b>'+e.g+'</b> &middot; '+esc(groups[e.g]||'')+'</div></div>'
      +'<div><div class="k">Podgrupa</div><div class="v"><b>'+e.s.slice(0,2)+' '+e.s.slice(2,4)+'</b> &middot; '+esc(subgroups[e.s]||'')+'</div></div>'
      +'<div><div class="k">Status</div><div class="v">'+(e.haz?'Opasan otpad — označen zvezdicom (*) u Katalogu.':'Neopasan otpad.')+'</div></div>'
      +'<div><div class="k">Jugo-Impex dozvole</div>'+permitBadgeFull(e.pf)+'</div>'
      +'</div>'
      +'<div class="actions"><button id="copyCode">Kopiraj broj</button><button id="copyFull">Kopiraj broj + naziv</button></div>'
      +'</div>';
    outEl.innerHTML=html;
    document.getElementById('copyCode').addEventListener('click',function(){copy(e.fmt+(e.haz?'*':''));});
    document.getElementById('copyFull').addEventListener('click',function(){copy(e.fmt+(e.haz?'*':'')+' — '+e.name);});
  }

  function renderEmpty(){
    lastResults=null;backEl.classList.remove('show');
    var inP=entries.filter(function(e){return e.pf>0;}).length;
    metaEl.textContent=entries.length+' indeksnih brojeva · '+inP+' u dozvolama JI';
    var html='<div class="empty"><h2>Grupe otpada</h2><div class="chips">';
    Object.keys(groups).sort().forEach(function(g){
      html+='<button class="chip" data-g="'+g+'"><span class="gn">'+g+'</span><span class="gt">'+esc(groups[g])+'</span></button>';
    });
    html+='</div></div>';
    outEl.innerHTML=html;
    Array.prototype.forEach.call(outEl.querySelectorAll('.chip'),function(chip){
      chip.addEventListener('click',function(){
        setMode('num');qEl.value=chip.getAttribute('data-g');
        clearEl.classList.add('show');render();window.scrollTo({top:0,behavior:'smooth'});
      });
    });
  }

  function copy(text){
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(doToast,fb);}
    else fb();
    function fb(){var ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(x){}document.body.removeChild(ta);doToast();}
  }
  var tt;
  function doToast(){toastEl.classList.add('show');clearTimeout(tt);tt=setTimeout(function(){toastEl.classList.remove('show');},1400);}

  renderEmpty();qEl.focus();
})();

</script>
</body>
</html>
